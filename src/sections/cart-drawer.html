<!-- Cart drawer -->
    <div id="cartOverlay" class="fixed inset-0 z-50 hidden bg-black/50">
      <div class="absolute inset-0" id="cartBackdrop" aria-hidden="true"></div>

        <div class="flex items-center justify-between border-b border-zinc-200 p-4 dark:border-zinc-800">
          <div class="flex items-center gap-2">
            <div class="grid h-9 w-9 place-items-center rounded-xl bg-zinc-900 text-white dark:bg-white dark:text-zinc-900">🧾</div>
            <div>
              <div class="text-sm font-semibold" id="cartTitle"></div>
              <div class="text-xs text-zinc-600 dark:text-zinc-400" id="cartSubtitle"></div>
            </div>
          </div>
          <button id="btnCloseCart" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Close cart">
            <span id="iconClose2"></span>
          </button>
        </div>

        <div class="flex h-full flex-col">
          <div id="cartItems" class="flex-1 overflow-auto p-4"></div>

          <div class="border-t border-zinc-200 p-4 dark:border-zinc-800">
            <div class="flex items-center justify-between text-sm">
              <span class="text-zinc-600 dark:text-zinc-400" id="cartTotalLabel"></span>
              <span class="text-lg font-semibold" id="cartTotal"></span>
            </div>

            <div class="mt-3 grid gap-2">
              <button id="btnCheckoutTelegram" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-[#229ED9] px-5 py-3 text-sm font-semibold text-white hover:opacity-90">

              </button>
              <div class="grid grid-cols-2 gap-2">
                <button id="btnCheckoutInstagram" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
                  <span id="iconInstagram4"></span><span id="checkoutInstagram"></span>
                </button>
                <button id="btnCheckoutPhone" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
                  <span id="iconPhone5"></span><span id="checkoutPhone"></span>
                </button>
              </div>
            </div>

            <div class="mt-3 text-xs text-zinc-600 dark:text-zinc-400" id="checkoutHint"></div>
          </div>
        </div>
      </aside>
    </div>
