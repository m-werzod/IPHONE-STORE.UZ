<!-- Header -->
    <header class="sticky top-0 z-30 border-b border-zinc-200 bg-zinc-50/75 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/65">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
        <div class="flex items-center gap-3">
          <button id="btnMobileMenu" class="md:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Open menu">
            <span id="iconMenu"></span>
          </button>

          <a href="#home" class="group flex items-center gap-2">
            <div class=" grid h-10 w-10 place-items-center rounded-2xl bg-zinc-900 text-white shadow-soft dark:bg-white dark:text-zinc-900">
              <span class="text-lg font-bold text-rose-700">M</span>
            </div>
            <div class="leading-tight">
              <div class="text-sm font-semibold tracking-tight" id="storeName"></div>
              <div class="text-[12px] text-zinc-600 dark:text-zinc-400" id="storeTagline"></div>
            </div>
          </a>
        </div>

        <!-- Search -->
        <div class="hidden md:flex w-full max-w-xl items-center gap-2">
          <div class="relative w-full">
            <input id="searchInput" type="search" class="w-full rounded-2xl border border-zinc-200 bg-white px-11 py-2.5 text-sm outline-none ring-0 placeholder:text-zinc-400 focus:border-zinc-900 dark:border-zinc-800 dark:bg-zinc-900 dark:focus:border-white" placeholder="Search products…" />
            <div class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" id="iconSearch"></div>
            <button id="btnClearSearch" class="absolute right-2 top-1/2 hidden -translate-y-1/2 rounded-xl px-2 py-1 text-xs text-zinc-600 hover:bg-zinc-100 dark:text-zinc-300 dark:hover:bg-zinc-800" aria-label="Clear search">Esc</button>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center gap-2">
          <div class="hidden sm:flex items-center gap-2">
            <select id="currencySelect" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
              <option value="UZS">UZS</option>
              <option value="USD">USD</option>
            </select>
            <select id="langSelect" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
              <option value="en">EN</option>
              <option value="ru">RU</option>
              <option value="uz">UZ</option>
            </select>
          </div>

          <button id="btnTheme" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Toggle theme">
            <span id="iconTheme"></span>
          </button>

          <button id="btnWishlist" class="relative inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-200 bg-white hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Wishlist">
            <span id="iconHeart"></span>
            <span id="wishCount" class="absolute -right-2 -top-2 rounded-full bg-zinc-900 px-2 py-0.5 text-[11px] font-semibold text-white dark:bg-white dark:text-zinc-900">0</span>
          </button>

          <button id="btnOpenCart" class="relative inline-flex h-10 items-center gap-2 rounded-xl border border-zinc-200 bg-white px-3 hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Cart">
            <span id="iconCart"></span>
            <span class="hidden sm:inline text-sm font-semibold" id="cartLabel"></span>
            <span id="cartCount" class="rounded-full bg-zinc-900 px-2 py-0.5 text-[11px] font-semibold text-white dark:bg-white dark:text-zinc-900">0</span>
          </button>
        </div>
      </div>

      <!-- Mobile search row -->
      <div class="md:hidden border-t border-zinc-200 dark:border-zinc-800">
        <div class="mx-auto max-w-6xl px-4 py-3">
          <div class="relative w-full">
            <input id="searchInputMobile" type="search" class="w-full rounded-2xl border border-zinc-200 bg-white px-11 py-2.5 text-sm outline-none ring-0 placeholder:text-zinc-400 focus:border-zinc-900 dark:border-zinc-800 dark:bg-zinc-900 dark:focus:border-white" placeholder="Search products…" />
            <div class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" id="iconSearchMobile"></div>
          </div>

          <div class="mt-3 flex items-center gap-2">
            <select id="currencySelectMobile" class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
              <option value="UZS">UZS</option>
              <option value="USD">USD</option>
            </select>
            <select id="langSelectMobile" class="w-full rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800">
              <option value="en">EN</option>
              <option value="ru">RU</option>
              <option value="uz">UZ</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Mobile menu drawer (simple) -->
      <div id="mobileMenu" class="hidden md:hidden border-t border-zinc-200 bg-white dark:border-zinc-800 dark:bg-zinc-950">
        <div class="mx-auto max-w-6xl px-4 py-4">
          <div class="grid gap-2">
            <a class="rounded-xl border border-zinc-200 px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:hover:bg-zinc-900" href="#products" id="navProducts"></a>
            <a class="rounded-xl border border-zinc-200 px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:hover:bg-zinc-900" href="#services" id="navServices"></a>
            <a class="rounded-xl border border-zinc-200 px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:hover:bg-zinc-900" href="#location" id="navLocation"></a>
            <a class="rounded-xl border border-zinc-200 px-4 py-3 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:hover:bg-zinc-900" href="#faq" id="navFAQ"></a>
          </div>
        </div>
      </div>
    </header>
