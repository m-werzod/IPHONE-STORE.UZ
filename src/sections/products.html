<!-- Products -->
      <section id="products" class="scroll-mt-28 pb-10">
        <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
          <div>
            <h2 class="text-2xl font-semibold tracking-tight md:text-3xl" id="productsTitle"></h2>
            <p class="mt-2 text-sm text-zinc-700 dark:text-zinc-300" id="productsSubtitle"></p>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            <div class="inline-flex items-center gap-2 rounded-2xl border border-zinc-200 bg-white p-2 dark:border-zinc-800 dark:bg-zinc-900">
              <span class="px-2 text-xs font-semibold text-zinc-600 dark:text-zinc-400" id="sortLabel"></span>
              <select id="sortSelect" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-950 dark:hover:bg-zinc-900">
                <option value="featured" id="sortFeatured"></option>
                <option value="new" id="sortNew"></option>
                <option value="priceAsc" id="sortPriceAsc"></option>
                <option value="priceDesc" id="sortPriceDesc"></option>
              </select>
            </div>

            <button id="btnReset" class="rounded-2xl border border-zinc-200 bg-white px-4 py-2 text-sm font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800" aria-label="Reset filters">
              <span id="resetLabel"></span>
            </button>
          </div>
        </div>

        <!-- Categories -->
        <div class="mt-5 flex gap-2 overflow-x-auto pb-2 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden" id="categoryRow"></div>

        <!-- Results meta -->
        <div class="mt-3 flex flex-wrap items-center justify-between gap-2 text-sm">
          <div class="text-zinc-600 dark:text-zinc-400" id="resultsMeta"></div>
          <div class="flex items-center gap-2">
            <button id="btnToggleCompact" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-xs font-semibold hover:bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800"></button>
          </div>
        </div>

        <!-- Product grid -->
        <div id="productGrid" class="mt-5 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

        <!-- Empty state -->
        <div id="emptyState" class="mt-8 hidden rounded-[2rem] border border-zinc-200 bg-white p-8 text-center dark:border-zinc-800 dark:bg-zinc-900">
          <div class="mx-auto grid h-14 w-14 place-items-center rounded-2xl bg-zinc-900 text-white dark:bg-white dark:text-zinc-900">🔎</div>
          <div class="mt-3 text-lg font-semibold" id="emptyTitle"></div>
          <div class="mt-1 text-sm text-zinc-600 dark:text-zinc-400" id="emptyDesc"></div>
          <button id="btnEmptyReset" class="mt-4 rounded-2xl bg-zinc-900 px-5 py-2.5 text-sm font-semibold text-white hover:opacity-90 dark:bg-white dark:text-zinc-900"></button>
        </div>
      </section>
